<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" role="img" aria-labelledby="title desc">
  <title id="title">What an MCP server actually solves</title>
  <desc id="desc">A diagram contrasting three static ways an AI assistant gets documentation context — copy-paste, an llms.txt snapshot, and training data or web search — which all feed a stale answer, against an MCP server, which lets the assistant query the live docs site directly at request time.</desc>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a83b32" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#16794a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .before{fill:#fff;stroke:#e7cfc9;stroke-width:1.2}
      .badbox{fill:#fdecea;stroke:#e2b3ac}
      .goodbox{fill:#e3f5ee;stroke:#168060}
      .plain{fill:#fff;stroke:#d9e1e8;stroke-width:1.2}
      .stitle{font-size:14px;font-weight:700;fill:#16324b}
      .ssub{font-size:11.5px;fill:#5d7184}
      .sectlabel{font-size:12px;font-weight:800;letter-spacing:.06em}
      .badline{fill:none;stroke:#c9827a;stroke-width:1.5;stroke-dasharray:4 4;marker-end:url(#arrowGray)}
      .goodline{fill:none;stroke:#16794a;stroke-width:1.8;marker-end:url(#arrowGreen)}
      .verdictbad{font-size:12.5px;font-weight:700;fill:#a83b32}
      .verdictgood{font-size:12.5px;font-weight:700;fill:#0f6b4c}
    </style>
  </defs>

  <rect width="1000" height="620" fill="#f7f9fc"/>
  <rect x="24" y="20" width="952" height="580" rx="18" fill="#fff" stroke="#e1e8ef"/>
  <text class="t" x="58" y="64" font-size="24" font-weight="750" fill="#14283a">What an MCP server actually solves</text>
  <text class="t" x="58" y="88" font-size="13" fill="#5d7184">The old paths hand an assistant a snapshot. MCP lets it ask your live docs directly, every time.</text>
  <line x1="58" y1="108" x2="942" y2="108" stroke="#e5ebf1"/>

  <!-- BEFORE section -->
  <text class="t sectlabel" x="58" y="140" fill="#a83b32">BEFORE — STATIC CONTEXT</text>

  <rect class="t before" x="58" y="160" width="270" height="60" rx="10"/>
  <text class="t stitle" x="76" y="184">Copy-pasted into a chat</text>
  <text class="t ssub" x="76" y="203">Five engineers, five stale copies</text>

  <rect class="t before" x="58" y="234" width="270" height="60" rx="10"/>
  <text class="t stitle" x="76" y="258">llms.txt snapshot</text>
  <text class="t ssub" x="76" y="277">One file, regenerated by hand</text>

  <rect class="t before" x="58" y="308" width="270" height="60" rx="10"/>
  <text class="t stitle" x="76" y="332">Training data / web search</text>
  <text class="t ssub" x="76" y="351">Pattern-matches, doesn't know your docs</text>

  <path class="badline" d="M328 190H392Q408 190 408 206V244Q408 260 424 260H460"/>
  <path class="badline" d="M328 264H460"/>
  <path class="badline" d="M328 338H392Q408 338 408 322V284Q408 268 424 268H460"/>

  <rect class="t badbox" x="460" y="216" width="180" height="88" rx="12"/>
  <text class="t stitle" x="550" y="252" text-anchor="middle" fill="#7a271f">AI Assistant</text>
  <text class="t ssub" x="550" y="272" text-anchor="middle" fill="#93453c">works from whatever</text>
  <text class="t ssub" x="550" y="288" text-anchor="middle" fill="#93453c">it already has loaded</text>

  <text class="t verdictbad" x="682" y="242">Confident answer.</text>
  <text class="t verdictbad" x="682" y="260">Might be eight</text>
  <text class="t verdictbad" x="682" y="278">months out of date.</text>

  <!-- AFTER section -->
  <line x1="58" y1="400" x2="942" y2="400" stroke="#e5ebf1"/>
  <text class="t sectlabel" x="58" y="432" fill="#0f6b4c">AFTER — MCP SERVER</text>

  <rect class="t plain" x="58" y="452" width="190" height="90" rx="12"/>
  <text class="t stitle" x="153" y="486" text-anchor="middle">Docs site</text>
  <text class="t ssub" x="153" y="506" text-anchor="middle">Same deploy pipeline</text>
  <text class="t ssub" x="153" y="522" text-anchor="middle">that publishes your docs</text>

  <path class="goodline" d="M248 497H304"/>

  <rect class="t goodbox" x="304" y="452" width="190" height="90" rx="12"/>
  <text class="t stitle" x="399" y="486" text-anchor="middle" fill="#0f6b4c">MCP Server</text>
  <text class="t ssub" x="399" y="506" text-anchor="middle" fill="#16705a">Stays in sync</text>
  <text class="t ssub" x="399" y="522" text-anchor="middle" fill="#16705a">automatically</text>

  <path class="goodline" d="M494 483H556"/>
  <path class="goodline" d="M556 511H494" marker-end="url(#arrowGreen)"/>
  <text class="t ssub" x="525" y="475" text-anchor="middle" fill="#5d7184">query</text>
  <text class="t ssub" x="525" y="530" text-anchor="middle" fill="#5d7184">answer</text>

  <rect class="t plain" x="556" y="452" width="190" height="90" rx="12"/>
  <text class="t stitle" x="651" y="486" text-anchor="middle">AI Assistant</text>
  <text class="t ssub" x="651" y="506" text-anchor="middle">Claude, Cursor,</text>
  <text class="t ssub" x="651" y="522" text-anchor="middle">Copilot Chat</text>

  <text class="t verdictgood" x="778" y="480">Live, scoped to the</text>
  <text class="t verdictgood" x="778" y="498">question, current as</text>
  <text class="t verdictgood" x="778" y="516">of the last deploy.</text>

  <text class="t" x="500" y="580" text-anchor="middle" font-size="12.5" fill="#62758a">Complements llms.txt rather than replacing it — llms.txt loads the overview once, MCP grounds every question after that.</text>
</svg>
