<svg width="100%" viewBox="0 0 780 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Docs-as-code tool comparison: MkDocs, Docusaurus, Zensical, Markdoc</title>
  <desc>A visual comparison of four docs-as-code tools across five criteria: setup complexity, language, best for, writer friendliness, and custom UI support.</desc>

  <!-- Row label background strip -->
  <rect x="0" y="100" width="120" height="300" fill="#f8f8f6" rx="0"/>

  <!-- Row labels -->
  <text x="112" y="134" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#5f5e5a" font-weight="500">Setup</text>
  <text x="112" y="190" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#5f5e5a" font-weight="500">Best for</text>
  <text x="112" y="246" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#5f5e5a" font-weight="500">Writers</text>
  <text x="112" y="302" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#5f5e5a" font-weight="500">Custom UI</text>
  <text x="112" y="358" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#5f5e5a" font-weight="500">Ready to use</text>

  <!-- Divider lines -->
  <line x1="16" y1="110" x2="764" y2="110" stroke="#d3d1c7" stroke-width="0.5"/>
  <line x1="16" y1="166" x2="764" y2="166" stroke="#d3d1c7" stroke-width="0.5"/>
  <line x1="16" y1="222" x2="764" y2="222" stroke="#d3d1c7" stroke-width="0.5"/>
  <line x1="16" y1="278" x2="764" y2="278" stroke="#d3d1c7" stroke-width="0.5"/>
  <line x1="16" y1="334" x2="764" y2="334" stroke="#d3d1c7" stroke-width="0.5"/>
  <line x1="16" y1="390" x2="764" y2="390" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- MkDocs header -->
  <rect x="126" y="30" width="148" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="200" y="52" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#085041">MkDocs</text>
  <text x="200" y="72" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#0f6e56">Python · YAML</text>

  <!-- Docusaurus header -->
  <rect x="290" y="30" width="148" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="364" y="52" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c447c">Docusaurus</text>
  <text x="364" y="72" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#185fa5">Node · React</text>

  <!-- Zensical header -->
  <rect x="454" y="30" width="148" height="52" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="528" y="52" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#3c3489">Zensical</text>
  <text x="528" y="72" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#534ab7">Python · TOML</text>

  <!-- Markdoc header -->
  <rect x="618" y="30" width="148" height="52" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="692" y="52" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#712b13">Markdoc</text>
  <text x="692" y="72" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#993c1d">JS · React</text>

  <!-- MkDocs data -->
  <text x="200" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Simple</text>
  <text x="200" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Focused docs</text>
  <text x="200" y="246" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Friendly</text>
  <text x="200" y="302" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Limited</text>
  <text x="200" y="358" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Yes</text>

  <!-- Docusaurus data -->
  <text x="364" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Moderate</text>
  <text x="364" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Docs + blog</text>
  <text x="364" y="246" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#ba7517">React needed</text>
  <text x="364" y="302" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Rich</text>
  <text x="364" y="358" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Yes</text>

  <!-- Zensical data -->
  <text x="528" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Simple</text>
  <text x="528" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Modern docs</text>
  <text x="528" y="246" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Friendly</text>
  <text x="528" y="302" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Moderate</text>
  <text x="528" y="358" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Yes</text>

  <!-- Markdoc data -->
  <text x="692" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Complex</text>
  <text x="692" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#444441">Custom apps</text>
  <text x="692" y="246" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#a32d2d">Dev required</text>
  <text x="692" y="302" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#3b6d11">✓ Full</text>
  <text x="692" y="358" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#a32d2d">Build needed</text>

  <!-- Footer note -->
  <text x="440" y="418" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#888780" opacity="0.8">Choose the tool that fits your team's skills, not the most impressive demo.</text>
</svg>
