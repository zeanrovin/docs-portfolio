<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" role="img" aria-labelledby="title desc">
  <title id="title">Markdoc as a content layer</title>
  <desc id="desc">A diagram showing Markdoc parsing and transforming a Markdown-with-tags source file into a content tree, which is then rendered by a surrounding Next.js or React application that Markdoc does not provide.</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b9aaa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .step{fill:#fff;stroke:#d9e1e8;stroke-width:1.2}
      .md{fill:#fcece6;stroke:#b8502a}
      .app{fill:#eef4fb;stroke:#9db8d6;stroke-dasharray:5 4}
      .stitle{font-size:15px;font-weight:700;fill:#16324b}
      .ssub{font-size:11.5px;fill:#5d7184}
      .label{font-size:12px;font-weight:700}
      .apptitle{font-size:13px;font-weight:700;fill:#2c4a6e}
    </style>
  </defs>

  <rect width="1000" height="460" fill="#f7f9fc"/>
  <rect x="24" y="20" width="952" height="420" rx="18" fill="#fff" stroke="#e1e8ef"/>
  <text class="t" x="58" y="64" font-size="24" font-weight="750" fill="#14283a">Markdoc as a content layer</text>
  <text class="t" x="58" y="88" font-size="13" fill="#5d7184">Markdoc owns parsing and transforming content. Everything after that is your application to build.</text>
  <line x1="58" y1="108" x2="942" y2="108" stroke="#e5ebf1"/>

  <!-- Step 1: source -->
  <rect class="t step md" x="58" y="180" width="190" height="100" rx="12"/>
  <text class="t stitle" x="153" y="215" text-anchor="middle">content.md</text>
  <text class="t ssub" x="153" y="236" text-anchor="middle">Markdown, plus</text>
  <text class="t ssub" x="153" y="252" text-anchor="middle">{% custom tags %}</text>

  <path d="M248 230H300" fill="none" stroke="#8b9aaa" stroke-width="1.7" marker-end="url(#arrow2)"/>

  <!-- Step 2: parse -->
  <rect class="t step" x="300" y="180" width="190" height="100" rx="12"/>
  <text class="t stitle" x="395" y="215" text-anchor="middle">Markdoc.parse()</text>
  <text class="t ssub" x="395" y="236" text-anchor="middle">walks the source into</text>
  <text class="t ssub" x="395" y="252" text-anchor="middle">an AST</text>

  <path d="M490 230H542" fill="none" stroke="#8b9aaa" stroke-width="1.7" marker-end="url(#arrow2)"/>

  <!-- App boundary wrapping transform + render -->
  <rect class="app" x="542" y="130" width="400" height="200" rx="14"/>
  <text class="t apptitle" x="742" y="152" text-anchor="middle">Your application (Next.js, React, or custom)</text>

  <!-- Step 3: transform -->
  <rect class="t step" x="562" y="180" width="170" height="100" rx="12"/>
  <text class="t stitle" x="647" y="215" text-anchor="middle">.transform()</text>
  <text class="t ssub" x="647" y="236" text-anchor="middle">validates + maps tags</text>
  <text class="t ssub" x="647" y="252" text-anchor="middle">to your components</text>

  <path d="M732 230H772" fill="none" stroke="#8b9aaa" stroke-width="1.7" marker-end="url(#arrow2)"/>

  <!-- Step 4: render -->
  <rect class="t step" x="772" y="180" width="150" height="100" rx="12"/>
  <text class="t stitle" x="847" y="215" text-anchor="middle">Your renderer</text>
  <text class="t ssub" x="847" y="236" text-anchor="middle">HTML, React, or</text>
  <text class="t ssub" x="847" y="252" text-anchor="middle">any framework</text>

  <text class="t" x="500" y="400" text-anchor="middle" font-size="12.5" fill="#62758a">MkDocs, Docusaurus, and Zensical bundle all four steps for you. Markdoc only gives you the first two.</text>
</svg>
